<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Fitts's Law Experiment</title>
    <style>
        * {
            -webkit-touch-callout: none; 
            -webkit-user-select: none;   
            user-select: none;
            -webkit-tap-highlight-color: rgba(0,0,0,0); 
        }
        
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: white; /* 다크모드 시 black 으로 변경 */
            touch-action: none; 
            font-family: Arial, sans-serif;
        }
        
        canvas {
            display: block;
        }
        
        #startScreen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        
        button {
            padding: 15px 40px;
            font-size: 24px;
            font-weight: bold;
            background-color: #eb7d32;
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        button:active { background-color: #cc6a27; }
    </style>
</head>
<body>

    <div id="startScreen">
        <h1>Fitts's Law Experiment</h1>
        <p style="color:#666; margin-bottom:30px;">iPad Pro - Closed-loop Mode</p>
        <button id="startBtn">실험 시작 (전체화면)</button>
    </div>

    <canvas id="expCanvas"></canvas>

    <script>
        const canvas = document.getElementById('expCanvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('startScreen');
        const startBtn = document.getElementById('startBtn');

        let audioCtx;
        
        let logicalWidth = window.innerWidth;
        let logicalHeight = window.innerHeight;
        
        function resizeCanvas() {
            const dpr = window.devicePixelRatio || 1;
            
            logicalWidth = window.innerWidth;
            logicalHeight = window.innerHeight;
            
            canvas.width = logicalWidth * dpr;
            canvas.height = logicalHeight * dpr;
            
            canvas.style.width = logicalWidth + 'px';
            canvas.style.height = logicalHeight + 'px';
            
            ctx.resetTransform();
            ctx.scale(dpr, dpr);
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const COLOR_BG = "#FFFFFF";
        const COLOR_TEXT = "#141414";
        const COLOR_GREY = "#969696";
        const COLOR_INDUCER = "#96A0AA";
        const COLOR_COMMON = "#EB7D32";

        const CSS_PIXELS_PER_CM = 52.0; 
        const cm_to_px = (cm) => cm * CSS_PIXELS_PER_CM;

        // 원하신다면 최대 거리인 11로 수정하셔도 됩니다.
        const DISTANCE_A_CM = 10;
        const DISTANCE_A_PX = cm_to_px(DISTANCE_A_CM);

        function playBeep() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const ID_CONDITIONS = [2.5, 3.0, 3.5, 4.0, 4.5, 5.0, 5.5];
        const ILLUSION_TYPES = ["Control", "Small_Version", "Big_Version"];
        const REPETITIONS = 20; // 본 실험용 20회 반복
        const PRACTICE_TRIALS_COUNT = 10;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        let main_sequence = [];
        for (let illusion of ILLUSION_TYPES) {
            for (let id_val of ID_CONDITIONS) {
                let target_width_px = DISTANCE_A_PX / (Math.pow(2, id_val) - 1);
                for (let i = 0; i < REPETITIONS; i++) {
                    main_sequence.push({
                        Type: "Main", Illusion: illusion, ID: id_val, 
                        Width: target_width_px, Distance: DISTANCE_A_PX
                    });
                }
            }
        }
        shuffle(main_sequence);

        let practice_sequence = main_sequence.slice(0, PRACTICE_TRIALS_COUNT).map(t => ({...t, Type: "Practice"}));
        let full_sequence = practice_sequence.concat(main_sequence);
        let results = [];

        let running = false;
        let current_idx = 0;
        let is_practice_done = false;

        const STATE_IDLE = 0, STATE_HOLDING = 1, STATE_MOVING = 2, STATE_REST = 3;
        let state = STATE_IDLE;

        let hold_start_time = 0;
        let foreperiod = 0;
        let move_start_time = 0;
        let beep_time = 0;

        let pointer_down = false;
        let pointer_x = 0;
        let pointer_y = 0;

        function drawCircle(x, y, radius, color) {
            ctx.beginPath();
            ctx.arc(x, y, radius, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        }

        function drawTargets(cx, cy, width, illusion_type, is_target=false) {
            const radius = width / 2;
            if (is_target) {
                if (illusion_type === "Small_Version") {
                    const inducer_dia = width * 2.0;
                    const dist_to_center = width * 2.12;
                    for (let i = 0; i < 6; i++) {
                        const rad = (Math.PI / 180) * (60 * i);
                        const ix = cx + Math.cos(rad) * dist_to_center;
                        const iy = cy + Math.sin(rad) * dist_to_center;
                        drawCircle(ix, iy, inducer_dia / 2, COLOR_INDUCER);
                    }
                } else if (illusion_type === "Big_Version") {
                    const inducer_dia = width * 0.46875;
                    const dist_to_center = width * 0.83;
                    for (let i = 0; i < 8; i++) {
                        const rad = (Math.PI / 180) * (45 * i);
                        const ix = cx + Math.cos(rad) * dist_to_center;
                        const iy = cy + Math.sin(rad) * dist_to_center;
                        drawCircle(ix, iy, inducer_dia / 2, COLOR_INDUCER);
                    }
                }
            }
            drawCircle(cx, cy, radius, COLOR_COMMON);
        }

        function drawText(text, y, size, color) {
            ctx.fillStyle = color;
            ctx.font = `${size}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(text, logicalWidth / 2, y); 
        }

        let animationId;
        function loop() {
            if (!running) return;

            if (current_idx >= full_sequence.length) {
                running = false;
                downloadCSV();
                alert("모든 실험이 종료되었습니다. 데이터를 다운로드합니다.");
                return;
            }

            const curr = full_sequence[current_idx];
            const w = curr.Width;
            const r = w / 2;
            const cx = logicalWidth / 2;
            const cy = logicalHeight / 2;
            const left_pos = { x: cx - DISTANCE_A_PX / 2, y: cy };
            const right_pos = { x: cx + DISTANCE_A_PX / 2, y: cy };

            if (curr.Type === "Main" && !is_practice_done) {
                state = STATE_REST;
                is_practice_done = true;
                pointer_down = false; 
            }

            const dist_to_start = Math.hypot(pointer_x - left_pos.x, pointer_y - left_pos.y);
            const now = performance.now() / 1000;

            if (state === STATE_IDLE) {
                if (pointer_down && dist_to_start <= r) {
                    state = STATE_HOLDING;
                    hold_start_time = now;
                    foreperiod = 0.8 + Math.random() * 1.0; 
                }
            } else if (state === STATE_HOLDING) {
                if (!pointer_down || dist_to_start > r) {
                    state = STATE_IDLE;
                } else if (now - hold_start_time >= foreperiod) {
                    playBeep();
                    beep_time = now;
                    state = STATE_MOVING;
                    move_start_time = 0;
                }
            } else if (state === STATE_MOVING) {
                if (move_start_time === 0 && (!pointer_down || dist_to_start > r)) {
                    move_start_time = now;
                }
            }

            ctx.fillStyle = COLOR_BG;
            ctx.fillRect(0, 0, logicalWidth, logicalHeight); 

            if (curr.Type === "Practice" && state !== STATE_REST) {
                drawText("[ PRACTICE MODE ]", 80, 24, COLOR_GREY);
            }

            if (state === STATE_REST) {
                drawText("Practice Finished.", cy - 40, 32, COLOR_TEXT);
                drawText("Tap anywhere to start Main Experiment.", cy + 20, 24, COLOR_GREY);
            } else {
                // 시작원(왼쪽 타겟)은 항상 렌더링
                drawTargets(left_pos.x, left_pos.y, w, "Control", false);
                
                // [Closed-loop 시스템 핵심 변경점]
                // 비프음이 울린 후(STATE_MOVING 상태)에만 오른쪽 타겟(착시 포함)이 화면에 나타납니다.
                if (state === STATE_MOVING) {
                    drawTargets(right_pos.x, right_pos.y, w, curr.Illusion, true);
                }

                let guideY = 140;
                if (state === STATE_IDLE) drawText("Place stylus on LEFT target to start", guideY, 28, COLOR_TEXT);
                else if (state === STATE_HOLDING) drawText("Wait for Beep...", guideY, 28, COLOR_TEXT);
                else if (state === STATE_MOVING) drawText("GO FAST!", guideY, 28, COLOR_TEXT);
            }

            const mode_text = curr.Type === "Practice" ? "PRACTICE" : "MAIN EXP";
            ctx.fillStyle = COLOR_GREY;
            ctx.font = "20px Arial";
            ctx.textBaseline = "middle";
            
            ctx.textAlign = "left";
            ctx.fillText(`${mode_text} - Trial: ${current_idx + 1} / ${full_sequence.length}`, 20, logicalHeight - 40);

            // 우측 상단 종료 버튼
            ctx.textAlign = "right";
            ctx.fillText("Exit & Save", logicalWidth - 20, 40);

            animationId = requestAnimationFrame(loop);
        }

        function handleDown(e) {
            if(e.cancelable) e.preventDefault(); 
            if (!running) return;

            pointer_x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            pointer_y = e.clientY || (e.touches ? e.touches[0].clientY : 0);

            if (pointer_x > logicalWidth - 150 && pointer_y < 80) {
                running = false; 
                downloadCSV();   
                alert("실험이 중단되었습니다. 지금까지의 데이터를 저장합니다.");
                
                ctx.fillStyle = COLOR_BG;
                ctx.fillRect(0, 0, logicalWidth, logicalHeight);
                startScreen.style.display = 'flex';
                return;
            }

            pointer_down = true;

            if (state === STATE_REST) {
                state = STATE_IDLE;
                setTimeout(() => pointer_down = false, 100);
                return;
            }

            if (state === STATE_MOVING) {
                const cx = logicalWidth / 2;
                const right_pos = { x: cx + DISTANCE_A_PX / 2, y: logicalHeight / 2 };
                const dist_target = Math.hypot(pointer_x - right_pos.x, pointer_y - right_pos.y);
                const w = full_sequence[current_idx].Width;

                if (dist_target <= w * 2) {
                    const end_time = performance.now() / 1000;
                    
                    if (move_start_time === 0) move_start_time = beep_time; 
                    
                    let rt_sec = move_start_time - beep_time;
                    let mt_sec = end_time - move_start_time;

                    const curr = full_sequence[current_idx];
                    if (curr.Type === "Main") {
                        results.push({
                            Trial_Idx: current_idx + 1 - PRACTICE_TRIALS_COUNT,
                            Illusion: curr.Illusion,
                            ID: curr.ID,
                            Width_Px: Math.round(w * 10) / 10,
                            Reaction_Time_ms: Math.round(rt_sec * 1000 * 100) / 100,
                            Movement_Time_ms: Math.round(mt_sec * 1000 * 100) / 100,
                            Hit: dist_target <= (w / 2),
                            Error_Px: Math.round(dist_target * 100) / 100
                        });
                    }

                    current_idx++;
                    state = STATE_IDLE;
                    move_start_time = 0;
                    beep_time = 0;
                    pointer_down = false; 
                }
            }
        }

        function handleMove(e) {
            if(e.cancelable) e.preventDefault(); 
            pointer_x = e.clientX || (e.touches ? e.touches[0].clientX : 0);
            pointer_y = e.clientY || (e.touches ? e.touches[0].clientY : 0);
        }

        function handleUp(e) {
            pointer_down = false;
        }

        window.addEventListener('pointerdown', handleDown, { passive: false });
        window.addEventListener('pointermove', handleMove, { passive: false });
        window.addEventListener('pointerup', handleUp, { passive: false });

        startBtn.addEventListener('click', () => {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 사파리 오디오 강제 활성화 (Warm-up)
            const unlockOsc = audioCtx.createOscillator();
            const unlockGain = audioCtx.createGain();
            unlockGain.gain.value = 0; 
            unlockOsc.connect(unlockGain);
            unlockGain.connect(audioCtx.destination);
            unlockOsc.start();
            unlockOsc.stop(audioCtx.currentTime + 0.01);

            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else if (document.documentElement.webkitRequestFullscreen) {
                document.documentElement.webkitRequestFullscreen();
            }

            startScreen.style.display = 'none';
            running = true;
            resizeCanvas(); 
            loop(); 
        });

        function downloadCSV() {
            if (results.length === 0) return;
            
            const keys = Object.keys(results[0]);
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF" + keys.join(",") + "\n";
            
            results.forEach(row => {
                csvContent += keys.map(k => row[k]).join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            
            const date = new Date();
            const timeStr = `${date.getFullYear()}${(date.getMonth()+1).toString().padStart(2,'0')}${date.getDate().toString().padStart(2,'0')}_${date.getHours().toString().padStart(2,'0')}${date.getMinutes().toString().padStart(2,'0')}`;
            link.setAttribute("download", `fitts_ipad_result_${timeStr}.csv`);
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
